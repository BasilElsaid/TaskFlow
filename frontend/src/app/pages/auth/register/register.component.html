<div class="flex items-center justify-center py-20">
  <div
    class="w-full max-w-md bg-white border border-gray-200 rounded-2xl p-8 shadow-sm"
  >
    <div class="text-center">
      <h1 class="text-3xl font-semibold">Crea un account</h1>

      <p class="mt-2 text-gray-500">
        Inizia ad organizzare i tuoi progetti con TaskFlow.
      </p>
    </div>

    <form
      [formGroup]="registerForm"
      (ngSubmit)="register()"
      class="mt-8 space-y-5"
    >
      <div>
        <label class="block text-sm font-medium mb-2"> Nome </label>

        <input
          type="text"
          formControlName="firstName"
          placeholder="Mario"
          class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-black"
        />
      </div>

      <div>
        <label class="block text-sm font-medium mb-2"> Cognome </label>

        <input
          type="text"
          formControlName="lastName"
          placeholder="Rossi"
          class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-black"
        />
      </div>

      <div>
        <label class="block text-sm font-medium mb-2"> Email </label>

        <input
          type="email"
          formControlName="email"
          placeholder="nome@email.com"
          class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-black"
        />
      </div>

      <div>
        <label class="block text-sm font-medium mb-2"> Password </label>

        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-black"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition"
      >
        Registrati
      </button>
    </form>

    <p *ngIf="errorMessage" class="text-red-500 text-sm mt-4 text-center">
      {{ errorMessage }}
    </p>

    <p class="mt-6 text-center text-sm text-gray-500">
      Hai già un account?

      <a
        routerLink="/auth/login"
        class="text-black font-medium hover:underline"
      >
        Accedi
      </a>
    </p>
  </div>
</div>
