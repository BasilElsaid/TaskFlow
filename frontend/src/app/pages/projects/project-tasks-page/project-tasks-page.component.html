<div
  class="min-h-screen bg-gray-50 flex items-center justify-center px-6 py-10"
>
  <div
    class="w-full max-w-6xl bg-white border border-gray-200 rounded-2xl shadow-sm p-8"
  >
    <!-- TOP NAV INSIDE CARD -->
    <div class="mb-6">
      <a
        routerLink="/dashboard/projects"
        class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-black transition"
      >
        <!-- freccia -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 19l-7-7 7-7"
          />
        </svg>

        Torna ai Progetti
      </a>
    </div>
    <!-- HEADER -->
    <div
      class="flex flex-col md:flex-row md:items-center md:justify-between gap-6 mb-8"
    >
      <h1 class="text-3xl font-semibold">Task del progetto</h1>
    </div>

    <!-- TASK LIST -->
    <div
      class="bg-white border border-gray-200 rounded-xl shadow-sm divide-y divide-gray-100"
    >
      <div
        *ngFor="let task of tasks"
        class="p-5 flex items-center justify-between"
      >
        <!-- LEFT -->
        <div>
          <p class="font-medium text-gray-900">
            {{ task.title }}
          </p>

          <p class="text-sm text-gray-500 mt-1">
            {{ task.description }}
          </p>
        </div>

        <!-- RIGHT -->
        <div class="flex items-center gap-3">
          <span
            class="text-xs px-3 py-1 rounded-full bg-gray-100 text-gray-600"
          >
            {{ task.taskStatus }}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
