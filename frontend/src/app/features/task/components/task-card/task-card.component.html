<div
  class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm hover:shadow-md transition"
>
  <h3 class="font-semibold text-lg">
    {{ task.title }}
  </h3>

  <p class="text-gray-500 mt-2 text-sm">
    {{ task.description }}
  </p>

  <div class="mt-5 flex justify-between text-sm text-gray-500">
    <span>Scadenza</span>

    <span>
      {{ task.dueDate ? (task.dueDate | date: "dd/MM/yyyy") : "Scaduto" }}
    </span>
  </div>

  <div class="mt-6 flex flex-wrap gap-2">
    <button
      (click)="details.emit(task)"
      class="px-3 py-2 text-sm border border-gray-200 rounded-lg hover:bg-gray-50 transition"
    >
      Dettagli
    </button>

    <button
      (click)="edit.emit(task)"
      class="px-3 py-2 text-sm bg-black text-white rounded-lg hover:bg-gray-800 transition"
    >
      Modifica
    </button>

    <button
      (click)="delete.emit(task.id)"
      class="px-3 py-2 text-sm text-red-600 border border-red-200 rounded-lg hover:bg-red-50 transition"
    >
      Elimina
    </button>
  </div>
</div>
