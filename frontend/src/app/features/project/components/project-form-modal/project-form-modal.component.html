<!-- BACKDROP -->
<div
  class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-4"
>
  <!-- MODAL -->
  <div
    class="w-full max-w-md bg-white border border-gray-200 rounded-2xl p-8 shadow-sm"
  >
    <!-- HEADER -->
    <h2 class="text-3xl font-semibold">
      {{ title }}
    </h2>

    <p class="mt-2 text-gray-500">
      {{ subtitle }}
    </p>

    <!-- FORM -->
    <form
      [formGroup]="projectForm"
      (ngSubmit)="saveProject()"
      class="mt-8 space-y-5"
    >
      <!-- Nome -->
      <div>
        <label class="block text-sm font-medium mb-2"> Nome progetto </label>

        <input
          type="text"
          formControlName="name"
          placeholder="Es. Restyling sito web"
          class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-black"
        />

        <p
          *ngIf="
            projectForm.controls.name.touched &&
            projectForm.controls.name.invalid
          "
          class="text-red-500 text-sm mt-1"
        >
          Inserisci un nome.
        </p>
      </div>

      <!-- Descrizione -->
      <div>
        <label class="block text-sm font-medium mb-2"> Descrizione </label>

        <textarea
          rows="4"
          formControlName="description"
          placeholder="Descrivi brevemente il progetto..."
          class="w-full rounded-lg border border-gray-300 px-4 py-3 resize-none focus:outline-none focus:ring-2 focus:ring-black"
        ></textarea>
      </div>

      <!-- BUTTONS -->
      <div class="flex gap-3 pt-2">
        <button
          type="button"
          (click)="closeModal()"
          class="flex-1 border border-gray-300 py-3 rounded-lg hover:bg-gray-100 transition"
        >
          Annulla
        </button>

        <button
          type="submit"
          [disabled]="loading"
          class="flex-1 bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition disabled:opacity-50"
        >
          {{ loading ? "In Corso..." : "Salva" }}
        </button>
      </div>
    </form>

    <!-- ERROR -->
    <div *ngIf="errorMessage" class="mt-4 text-center">
      <div
        class="inline-block bg-red-50 border border-red-200 text-red-600 px-4 py-2 rounded-lg"
      >
        {{ errorMessage }}
      </div>
    </div>
  </div>
</div>
