<div
  class="min-h-screen bg-gray-50 flex items-center justify-center px-6 py-10"
>
  <div
    class="w-full max-w-6xl bg-white border border-gray-200 rounded-2xl shadow-sm p-8"
  >
    <!-- NAV -->
    <div class="mb-6">
      <a
        routerLink="/dashboard/projects"
        class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-black transition"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 19l-7-7 7-7"
          />
        </svg>

        Torna ai progetti
      </a>
    </div>

    <!-- PROJECT INFO -->
    <div *ngIf="project">
      <!-- HEADER -->
      <div
        class="flex flex-col md:flex-row md:items-center md:justify-between gap-6 mb-8"
      >
        <div>
          <h1 class="text-3xl font-semibold">
            {{ project.name }}
          </h1>

          <p class="text-gray-500 mt-3">
            {{ project.description }}
          </p>
        </div>

        <button
          (click)="openCreateModal()"
          class="bg-black text-white px-5 py-3 rounded-lg hover:bg-gray-800 transition"
        >
          + Nuovo Task
        </button>
      </div>

      <!-- STATS -->
      <div class="grid md:grid-cols-3 gap-6">
        <div class="border border-gray-200 rounded-xl p-5">
          <p class="text-gray-500 text-sm">Creato</p>

          <p class="font-medium mt-2">
            {{ project.createdAt | date }}
          </p>
        </div>

        <div class="border border-gray-200 rounded-xl p-5">
          <p class="text-gray-500 text-sm">Task</p>

          <p class="font-medium mt-2">
            {{ tasks.length }}
          </p>
        </div>

        <div class="border border-gray-200 rounded-xl p-5">
          <p class="text-gray-500 text-sm">Stato</p>

          <p class="font-medium mt-2">Attivo</p>
        </div>
      </div>

      <!-- TASK LIST -->
      <div class="mt-12">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-2xl font-semibold">Task del progetto</h2>

          <span class="text-sm text-gray-500"> {{ tasks.length }} totali </span>
        </div>

        <div
          *ngIf="tasks.length > 0"
          class="grid md:grid-cols-2 xl:grid-cols-3 gap-6"
        >
          <app-task-card
            *ngFor="let task of tasks"
            [task]="task"
            (details)="openTaskDetails($event)"
            (edit)="openEditModal($event)"
            (delete)="deleteTask($event)"
          >
          </app-task-card>
        </div>

        <!-- EMPTY -->
        <div
          *ngIf="tasks.length === 0"
          class="p-5 text-sm text-gray-500 border rounded-xl"
        >
          Nessun task presente per questo progetto.
        </div>
      </div>
    </div>
  </div>
</div>

<!-- TASK CREATE / EDIT MODAL -->
<app-task-form-modal
  *ngIf="showTaskModal && project"
  [task]="selectedTask"
  [projectId]="project.id"
  [title]="selectedTask ? 'Modifica task' : 'Nuovo task'"
  [subtitle]="
    selectedTask
      ? 'Aggiorna le informazioni del task.'
      : 'Crea un nuovo task per questo progetto.'
  "
  (close)="closeTaskModal()"
  (saved)="loadTasks()"
>
</app-task-form-modal>

<!-- TASK DETAILS MODAL -->
<app-task-details-modal
  *ngIf="showTaskDetails"
  [task]="selectedTask"
  (close)="closeTaskDetails()"
>
</app-task-details-modal>
