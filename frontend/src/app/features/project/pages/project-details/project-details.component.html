<div
  class="min-h-screen bg-gray-50 flex items-center justify-center px-6 py-10"
>
  <div
    class="w-full max-w-6xl bg-white border border-gray-200 rounded-2xl shadow-sm p-8"
  >
    <!-- NAV -->
    <div class="mb-6">
      <a
        routerLink="/dashboard/projects"
        class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-black transition"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 19l-7-7 7-7"
          />
        </svg>

        Torna ai progetti
      </a>
    </div>

    <!-- PROJECT INFO -->
    <div *ngIf="project">
      <!-- HEADER -->
      <div class="mb-8">
        <h1 class="text-3xl font-semibold">
          {{ project.name }}
        </h1>

        <p class="text-gray-500 mt-3">
          {{ project.description }}
        </p>
      </div>

      <!-- STATS -->
      <div class="grid md:grid-cols-3 gap-6">
        <!-- CREATED -->
        <div class="border border-gray-200 rounded-xl p-5">
          <p class="text-gray-500 text-sm">Creato</p>

          <p class="font-medium mt-2">
            {{ project.createdAt | date }}
          </p>
        </div>

        <!-- TASK COUNT -->
        <div class="border border-gray-200 rounded-xl p-5">
          <p class="text-gray-500 text-sm">Task</p>

          <p class="font-medium mt-2">
            {{ tasks.length }}
          </p>
        </div>

        <!-- STATUS -->
        <div class="border border-gray-200 rounded-xl p-5">
          <p class="text-gray-500 text-sm">Stato</p>

          <p class="font-medium mt-2">Attivo</p>
        </div>
      </div>

      <!-- TASK PREVIEW -->
      <div class="mt-12">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-2xl font-semibold">Task del progetto</h2>

          <span class="text-sm text-gray-500"> {{ tasks.length }} totali </span>
        </div>

        <div
          class="bg-white border border-gray-200 rounded-xl shadow-sm divide-y divide-gray-100"
        >
          <!-- TASK ITEM -->
          <div
            *ngFor="let task of tasks"
            class="p-5 flex items-center justify-between"
          >
            <!-- LEFT -->
            <div>
              <p class="font-medium text-gray-900">
                {{ task.title }}
              </p>

              <p class="text-sm text-gray-500 mt-1">
                {{ task.description }}
              </p>
            </div>

            <!-- STATUS -->
            <span
              class="text-xs px-3 py-1 rounded-full bg-gray-100 text-gray-600"
            >
              {{ task.taskStatus }}
            </span>
          </div>

          <!-- EMPTY -->
          <div *ngIf="tasks.length === 0" class="p-5 text-sm text-gray-500">
            Nessun task presente per questo progetto.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
