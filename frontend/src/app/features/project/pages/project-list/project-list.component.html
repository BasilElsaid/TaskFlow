<div
  class="min-h-screen bg-gray-50 flex items-center justify-center px-6 py-10"
>
  <div
    class="w-full max-w-6xl bg-white border border-gray-200 rounded-2xl shadow-sm p-8"
  >
    <!-- TOP NAV INSIDE CARD -->
    <div class="mb-6">
      <a
        routerLink="/dashboard"
        class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-black transition"
      >
        <!-- freccia -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 19l-7-7 7-7"
          />
        </svg>

        Torna alla Dashboard
      </a>
    </div>
    <!-- HEADER -->
    <div
      class="flex flex-col md:flex-row md:items-center md:justify-between gap-6 mb-8"
    >
      <h1 class="text-3xl font-semibold">Tutti i progetti</h1>
    </div>

    <!-- GRID -->
    <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-6">
      <app-project-card
        *ngFor="let project of projects"
        [project]="project"
        (edit)="openEditModal($event)"
        (delete)="deleteProject($event)"
      >
      </app-project-card>
    </div>
  </div>
</div>
<app-project-form-modal
  *ngIf="showProjectModal"
  [project]="selectedProject"
  [title]="selectedProject ? 'Modifica progetto' : 'Nuovo progetto'"
  [subtitle]="
    selectedProject
      ? 'Aggiorna le informazioni del progetto.'
      : 'Crea un nuovo progetto.'
  "
  (close)="closeProjectModal()"
  (saved)="loadProjects()"
>
</app-project-form-modal>
