<div
  class="min-h-screen bg-gray-50 flex items-center justify-center px-6 py-10"
>
  <div
    class="w-full max-w-6xl bg-white border border-gray-200 rounded-2xl shadow-sm p-8"
  >
    <!-- HEADER -->
    <div
      class="flex flex-col md:flex-row md:items-center md:justify-between gap-6"
    >
      <div>
        <h1 class="text-3xl font-semibold">Bentornato!</h1>
        <p class="text-gray-500 mt-2">Ecco una panoramica del tuo lavoro</p>
      </div>

      <button
        (click)="openCreateModal()"
        class="bg-black text-white px-5 py-3 rounded-lg hover:bg-gray-800 transition"
      >
        + Nuovo progetto
      </button>
    </div>

    <!-- STATS -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-10">
      <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
        <p class="text-gray-500 text-sm">Progetti</p>
        <h2 class="text-3xl font-semibold mt-2">{{ stats.projects }}</h2>
      </div>

      <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
        <p class="text-gray-500 text-sm">Task totali</p>
        <h2 class="text-3xl font-semibold mt-2">{{ stats.tasks }}</h2>
      </div>

      <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
        <p class="text-gray-500 text-sm">Completate</p>
        <h2 class="text-3xl font-semibold mt-2">{{ stats.completed }}</h2>
      </div>

      <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
        <p class="text-gray-500 text-sm">In scadenza</p>
        <h2 class="text-3xl font-semibold mt-2">{{ stats.dueSoon }}</h2>
      </div>
    </div>

    <!-- PROGETTI -->
    <div class="mt-14">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-semibold">I tuoi progetti</h2>

        <a
          routerLink="/dashboard/projects"
          class="text-sm text-gray-600 hover:underline"
        >
          Vedi tutti
        </a>
      </div>

      <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-6">
        <app-project-card
          *ngFor="let project of projects"
          [project]="project"
          (edit)="openEditModal($event)"
          (delete)="deleteProject($event)"
        >
        </app-project-card>
      </div>
    </div>
  </div>
</div>
<app-project-form-modal
  *ngIf="showProjectModal"
  [project]="selectedProject"
  [title]="selectedProject ? 'Modifica progetto' : 'Nuovo progetto'"
  [subtitle]="
    selectedProject
      ? 'Aggiorna le informazioni del progetto.'
      : 'Crea un nuovo progetto per iniziare ad organizzare le tue attività.'
  "
  (close)="closeProjectModal()"
  (saved)="loadDashboard()"
>
</app-project-form-modal>
