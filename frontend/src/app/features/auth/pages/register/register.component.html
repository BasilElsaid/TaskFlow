<app-auth-card
  title="Crea un account"
  subtitle="Inizia ad organizzare i tuoi progetti con TaskFlow."
>
  <form [formGroup]="registerForm" (ngSubmit)="register()" class="space-y-5">
    <!-- Nome -->
    <div>
      <label class="block text-sm font-medium mb-2"> Nome </label>

      <input
        type="text"
        formControlName="firstName"
        placeholder="Mario"
        class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-black"
      />

      <p
        *ngIf="
          registerForm.controls.firstName.touched &&
          registerForm.controls.firstName.invalid
        "
        class="text-red-500 text-sm mt-1"
      >
        Il nome è obbligatorio.
      </p>
    </div>

    <!-- Cognome -->
    <div>
      <label class="block text-sm font-medium mb-2"> Cognome </label>

      <input
        type="text"
        formControlName="lastName"
        placeholder="Rossi"
        class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-black"
      />

      <p
        *ngIf="
          registerForm.controls.lastName.touched &&
          registerForm.controls.lastName.invalid
        "
        class="text-red-500 text-sm mt-1"
      >
        Il cognome è obbligatorio.
      </p>
    </div>

    <!-- Email -->
    <div>
      <label class="block text-sm font-medium mb-2"> Email </label>

      <input
        type="email"
        formControlName="email"
        placeholder="nome@email.com"
        class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-black"
      />

      <p
        *ngIf="
          registerForm.controls.email.touched &&
          registerForm.controls.email.invalid
        "
        class="text-red-500 text-sm mt-1"
      >
        Inserisci un'email valida.
      </p>
    </div>

    <!-- Password -->
    <div>
      <label class="block text-sm font-medium mb-2"> Password </label>

      <input
        type="password"
        formControlName="password"
        placeholder="••••••••"
        class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-black"
      />

      <p
        *ngIf="
          registerForm.controls.password.touched &&
          registerForm.controls.password.invalid
        "
        class="text-red-500 text-sm mt-1"
      >
        La password deve contenere almeno 6 caratteri.
      </p>
    </div>

    <!-- Submit -->
    <button
      type="submit"
      [disabled]="registerForm.invalid"
      class="w-full bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition disabled:opacity-50 disabled:cursor-not-allowed"
    >
      Registrati
    </button>
  </form>

  <!-- ERROR -->
  <p *ngIf="errorMessage" class="text-red-500 text-sm mt-4 text-center">
    {{ errorMessage }}
  </p>

  <!-- FOOTER -->
  <p class="mt-6 text-center text-sm text-gray-500">
    Hai già un account?

    <a routerLink="/auth/login" class="text-black font-medium hover:underline">
      Accedi
    </a>
  </p>
</app-auth-card>
