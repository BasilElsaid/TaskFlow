<app-auth-card title="Bentornato" subtitle="Accedi al tuo account TaskFlow.">
  <form [formGroup]="loginForm" (ngSubmit)="login()" class="space-y-5">
    <div>
      <label class="block text-sm font-medium mb-2"> Email </label>

      <input
        type="email"
        formControlName="email"
        placeholder="nome@email.com"
        class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-black"
      />

      <p
        *ngIf="
          loginForm.controls.email.touched && loginForm.controls.email.invalid
        "
        class="text-red-500 text-sm mt-1"
      >
        Inserisci un'email valida.
      </p>
    </div>

    <div>
      <label class="block text-sm font-medium mb-2"> Password </label>

      <input
        type="password"
        formControlName="password"
        placeholder="••••••••"
        class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-black"
      />
    </div>

    <button
      type="submit"
      [disabled]="loading"
      class="w-full bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition disabled:opacity-50"
    >
      {{ loading ? "Accesso..." : "Accedi" }}
    </button>
  </form>

  <div *ngIf="errorMessage" class="mt-4 text-center">
    <div
      class="inline-block bg-red-50 border border-red-200 text-red-600 px-4 py-2 rounded-lg"
    >
      {{ errorMessage }}
    </div>
  </div>

  <p class="mt-6 text-center text-sm text-gray-500">
    Non hai un account?

    <a
      routerLink="/auth/register"
      class="text-black font-medium hover:underline"
    >
      Registrati
    </a>
  </p>
</app-auth-card>
